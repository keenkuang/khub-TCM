# kHUB 后端（预留 upstream 为未来多实例扩展）
upstream khub_backend {
    server khub:8765;
}

# 限流区：每 IP 每分钟最多 30 请求，突发 10
limit_req_zone $binary_remote_addr zone=khub_limit:10m rate=30r/m;

# HTTP → HTTPS 强制跳转
server {
    listen 80;
    server_name _;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name _;

    ssl_certificate     /etc/nginx/ssl/khub.crt;
    ssl_certificate_key /etc/nginx/ssl/khub.key;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!eNULL:!EXPORT:!DES:!RC4:!3DES:!MD5:!DSS:!PSK;

    add_header X-Content-Type-Options nosniff;
    add_header X-Frame-Options DENY;
    add_header X-XSS-Protection "1; mode=block";
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; form-action 'none'; frame-ancestors 'none'; base-uri 'self'; object-src 'none'" always;
    # HSTS：强制浏览器在 1 年内只走 HTTPS
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # kHUB 反代（Docker DNS 服务名）
    location / {
        limit_req zone=khub_limit burst=10 nodelay;
        proxy_pass http://khub_backend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_buffering off;
        proxy_read_timeout 120s;
    }

    # 健康检查（对外可见，返回服务状态与文档计数）
    location /health {
        proxy_pass http://khub_backend/health;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }

    access_log /dev/stdout;
    error_log /dev/stderr;
}
