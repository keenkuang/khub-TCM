server {
    listen 80;
    server_name kU24Dsktp 172.22.22.127 127.0.0.1;
    return 301 https://$server_name$request_uri;
}

server {
    listen 443 ssl http2;
    server_name kU24Dsktp 172.22.22.127 127.0.0.1;

    ssl_certificate     /etc/nginx/ssl/khub.crt;
    ssl_certificate_key /etc/nginx/ssl/khub.key;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    # 安全头部
    add_header X-Content-Type-Options nosniff;
    add_header X-Frame-Options DENY;
    add_header X-XSS-Protection "1; mode=block";

    # kHUB 反代
    location / {
        proxy_pass http://127.0.0.1:8765;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # 流式响应缓冲调优
        proxy_buffering off;
        proxy_read_timeout 120s;
    }

    # 健康检查（N+1 方式）
    location /health {
        proxy_pass http://127.0.0.1:8765/health;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }

    # 拒绝非 khub 路径
    location /nginx_status {
        deny all;
    }

    access_log /var/log/nginx/khub_access.log;
    error_log  /var/log/nginx/khub_error.log;
}
