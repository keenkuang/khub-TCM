[project]
name = "khub"
version = "0.2.4"
requires-python = ">=3.11"
dependencies = ["PyYAML>=6.0"]
[project.optional-dependencies]
dev = ["pytest>=8.0"]
pdf = ["pypdf>=4.0"]
ann = ["sqlite-vec>=0.1.9"]
crypto = ["cryptography>=41.0"]
s3 = ["boto3>=1.28"]
all = ["khub[pdf,ann,crypto,s3]"]
[project.scripts]
khub = "khub.cli:main"
[build-system]
requires = ["setuptools>=61"]
build-backend = "setuptools.build_meta"
[tool.setuptools]
packages = ["khub", "khub.adapters", "khub.extractors", "khub.llm", "khub.exam", "khub.clinical", "khub.ops", "khub.ha"]
[tool.pytest.ini_options]
testpaths = ["tests"]
pythonpath = ["."]
