<!DOCTYPE html>
<html lang="zh"><head><meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>kHUB</title>
<link rel="stylesheet" href="/web/style.css">
<script>
fetch('/api/info').then(r=>r.json()).then(d=>{
  if(d.name) document.title = d.name;
  if(d.logo_url) { var img=document.getElementById('brandLogo'); if(img) img.src=d.logo_url; }
}).catch(()=>{});
</script>
</head>
<body>
<header><img id="brandLogo" style="height:22px;vertical-align:middle;margin-right:6px;display:none" alt="logo">kHUB · 个人知识中枢
  <button class="theme-toggle" onclick="toggleTheme()" title="切换深色/浅色模式">🌙</button>
  <button class="ghost" onclick="logout()" style="margin-left:8px">注销</button>
</header>
<div class="wrap">
  <div id="stats" style="display:flex;gap:10px;flex-wrap:wrap;margin-bottom:14px"></div>
  <div class="bar">
    <input id="q" type="text" placeholder="全文检索（中文子串，如 桂枝汤 / 麻黄）">
    <button onclick="search()">检索</button>
    <button class="ghost" onclick="semantic()">语义</button>
    <button class="ghost" onclick="loadAll()">全部文档</button>
    <button class="ghost" onclick="loadConflicts()">冲突</button>
    <button class="ghost" onclick="loadSyncStatus()">同步状态</button>
    <button class="ghost" onclick="showView('ops');return false">运营</button>
    <button class="ghost" onclick="showView('course');return false">课程</button>
    <button class="ghost" onclick="showView('admin');return false" id="adminBtn" style="display:none">管理</button>
    <button class="ghost" onclick="loadFavorites();return false">收藏</button>
    <select id="sourceFilter" style="padding:6px 8px;border:1px solid #ccd;border-radius:6px;font-size:13px">
      <option value="">所有来源</option>
      <option value="obsidian">秘方</option>
      <option value="ima">IMA</option>
      <option value="imanote">IMA笔记</option>
      <option value="quip">Quip</option>
      <option value="kzocr">KZOCR</option>
    </select>
    <select id="tagFilter" style="padding:6px 8px;border:1px solid #ccd;border-radius:6px;font-size:13px">
      <option value="">全部标签</option>
    </select>
  </div>
  <div id="ops-panel" style="display:none">
    <h2>运营管理</h2>
    <div class="ops-nav">
      <button onclick="loadSchedules()">排班</button>
      <button onclick="loadAppointments()">预约</button>
    </div>
    <div id="ops-content">点击上方按钮加载数据</div>
  </div>
  <div id="course-panel" style="display:none">
    <h2>课程运营</h2>
    <div class="course-nav">
      <button onclick="loadCourses()">课程列表</button>
      <button onclick="showCourseForm()">创建课程</button>
    </div>
    <div id="course-content">点击上方按钮加载数据</div>
  </div>
  <div id="admin-panel" style="display:none">
    <h2>系统管理</h2>
    <div class="ops-nav">
      <button onclick="loadUsers()">用户管理</button>
    </div>
    <div id="admin-content">点击上方按钮加载数据</div>
  </div>
  <div id="results"></div>
</div>
<script src="/web/script.js"></script>

<!-- AI 助手对话框 -->
<button class="fab" id="ai-fab" onclick="aiToggle()" title="AI 助手">✨</button>
<div class="ai-panel" id="ai-panel">
  <div class="hdr"><span>✨ AI 助手</span><button class="close" onclick="aiToggle()">✕</button></div>
  <div class="msgs" id="ai-msgs"></div>
  <div class="input-area">
    <input id="ai-q" type="text" placeholder="输入问题..." maxlength="2000">
    <button id="ai-send">发送</button>
  </div>
  <div class="hint">基于知识库语义检索 + LLM 回答</div>
</div>
</body></html>
