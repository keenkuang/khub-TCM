services:
  khub:
    build: .
    restart: unless-stopped
    stop_grace_period: 60s
    volumes:
      - khub-db:/data/db
      - khub-library:/data/library
      - ./docker-entrypoint.sh:/usr/local/bin/docker-entrypoint.sh:ro
      # SSH agent 转发（可选，用于 SshReplica 远程灾备）
      # - $SSH_AUTH_SOCK:/ssh-agent:ro
      # SSH 密钥挂载（可选）
      # - ~/.ssh/id_ed25519:/home/app/.ssh/id_ed25519:ro
      # - ~/.ssh/known_hosts:/home/app/.ssh/known_hosts:ro
      # PII 密钥文件（可选）
      # - ./pii.key:/home/app/.khub/pii.key:ro
    environment:
      - KHUB_DB=/data/db/khub.db
      - KHUB_LIBRARY=/data/library
      # WAL 保留窗口：保留最近 1000 条或最近 7 天的已推送 WAL
      - KHUB_WAL_KEEP=1000
      - KHUB_WAL_KEEP_DAYS=7
      # PII 加密（默认启用）
      - KHUB_PII_ENCRYPT=1
      # PII 密钥由容器自动生成（首次启动），或通过 KHUB_PII_KEY 传入
      # - KHUB_PII_KEY=...               # 方式1：环境变量（注意不提交到 git）
      # - KHUB_PII_KEY_FILE=/root/.khub/pii.key  # 方式2：从文件加载（推荐）
      # 真实模型（可选，注释掉时为离线模式）
      # - KHUB_EMBEDDING_URL=http://host.docker.internal:8080/v1/embeddings
      # - KHUB_EMBED_API_KEY=${KHUB_EMBED_API_KEY:-}
      # - KHUB_EMBED_MODEL=bge-small-zh-v1.5
      # - KHUB_LLM_URL=http://host.docker.internal:8080/v1/chat/completions
      # - KHUB_LLM_API_KEY=${KHUB_LLM_API_KEY:-}
      # - KHUB_LLM_MODEL=qwen2.5-7b
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8765/health')"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 15s
    mem_limit: 1g
    mem_reservation: 512m
    cpus: "2"

  nginx:
    image: nginx:alpine
    restart: unless-stopped
    mem_limit: 128m
    mem_reservation: 64m
    cpus: "0.5"
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/khub-docker.conf:/etc/nginx/conf.d/default.conf:ro
      - ./ssl:/etc/nginx/ssl:ro
    depends_on:
      khub:
        condition: service_healthy

volumes:
  khub-db:
  khub-library:

# ══════════════════════════════════════════════════════════════════════════════
# 备份与恢复
# ══════════════════════════════════════════════════════════════════════════════
# khub 内置灾备命令（基于一致性快照 + WAL 回放），支持本地/SSH/S3 副本。
# 建议用宿主机 crontab 执行每日远程备份：
#
#   0 3 * * * cd /home/keen/khub-m1 && docker compose exec -T khub \
#     khub dr push --replica ssh://user@nas/backups/khub
#
# 恢复：
#   docker compose exec khub khub dr restore \
#     --replica ssh://user@nas/backups/khub --to latest --target /data/db/restored.db
#
# 更多选项见: khub dr --help 或 docs/disaster_recovery.md
